<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PanAfrica Connect Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #222;
    }

    /* ================= HEADER ================= */

    header {
      background: #1C1F2A;
      color: #F0B429;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      height: 96px;
      width: auto;
      background: #ffffff;
      padding: 6px;
      border-radius: 12px;
      object-fit: contain;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 600;
      color: #F0B429;
      letter-spacing: 0.6px;
    }

    header nav a {
      color: #F0B429;
      margin-left: 18px;
      text-decoration: none;
      font-weight: bold;
    }

    /* ================= HERO ================= */

    .hero {
      background: #1C1F2A;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .hero-logo {
      max-width: 220px;
      width: 100%;
      margin-bottom: 20px;
    }

    .hero a {
      display: inline-block;
      margin-top: 20px;
      background: #F0B429;
      color: #000;
      padding: 14px 30px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
    }

    /* ================= LIVE PLAYER ================= */

    .player {
      background: white;
      max-width: 600px;
      margin: -30px auto 40px;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    /* ================= CONTENT ================= */

    section {
      padding: 50px 20px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    .featured {
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: 20px;
      text-align: center;
    }

    /* ================= SHOWS GRID ================= */

    .toggle {
      display: block;
      margin: 20px auto;
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .shows-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .show-card {
      background: white;
      padding: 22px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      text-decoration: none;
      color: #222;
      transition: transform .2s;
    }

    .show-card:hover {
      transform: translateY(-4px);
    }

    /* ================= FOOTER ================= */

    footer {
      background: #1C1F2A;
      color: #aaa;
      text-align: center;
      padding: 25px;
