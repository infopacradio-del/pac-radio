<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PanAfrica Connect Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #222;
    }

    /* HEADER */
    header {
      background: #1C1F2A;
      color: #F0B429;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header nav a {
      color: #F0B429;
      margin-left: 18px;
      text-decoration: none;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      background: #1C1F2A;
      min-height: 55vh;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    .hero a {
      background: #F0B429;
      color: #000;
      padding: 14px 30px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 30px;
    }

    /* PLAYER */
    .player {
      background: white;
      max-width: 600px;
      margin: -40px auto 50px;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.15);
      text-align: center;
    }

    section {
      padding: 60px 20px;
      max-width: 1100px;
      margin: auto;
    }

    section h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }

    /* SHOW CARDS */
    .shows-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .show-card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      text-decoration: none;
      color: #222;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .show-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    }
