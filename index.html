<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Rights – Episodes | PAC Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h1>Your Rights – Episodes</h1>

<ul id="episode-list"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDkOfitOyXzftyriVlWIplzrMH4FPyCYw0",
  databaseURL: "https://pac-radio-d838c-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);
const episodesRef = ref(db, "episodes/your-rights");

onChildAdded(episodesRef, snap => {
  const ep = snap.val();

  const li = document.createElement("li");
  li.innerHTML = `
    <h3>${ep.title}</h3>
    <p>${ep.description || ""}</p>
    <audio controls style="width:100%">
      <source src="${ep.audio}" type="audio/mpegps://wa.me/?text=${encodeURIComponent(
      ep.title + ' – Listen on PAC Radio: ' + window.location.hreflementById("episode-list").appendChild(li);
});
</script>

</body>
</html>
