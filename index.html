<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PanAfrica Connect Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #222;
    }

      align-items: center;

    }

    }

    .hero {
      background: #1C1F2A;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .hero a {
      display: inline-block;
      margin-top: 20px;
      background: #F0B429;
      color: #000;
      padding: 14px 30px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
    }

    .player {

      margin: -30px auto 40px;
      padding: 24px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    section {
      padding: 50px 20px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }
