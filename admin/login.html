<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PAC Radio – Host Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      padding: 40px;
    }

    .login-box {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    button {
      padding: 10px 16px;
      width: 100%;
      font-size: 15px;
      cursor: pointer;
    }

    #status {
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1>Host Login</h1>
    <p>For PAC Radio hosts & moderators only.</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>

    <p id="status"></p>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    setPersistence,
    browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDkOfitOyXzftyriVlWIplzrMH4FPyCYw0",
    authDomain: "pac-radio-d838c.firebaseapp.com"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Persist login across pages
  await setPersistence(auth, browserLocalPersistence);

  document.getElementById("loginBtn").onclick = () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const status = document.getElementById("status");

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        status.style.color = "green";
        status.textContent = "Login successful. Redirecting...";
        window.location.href = "/pac-radio/admin/dashboard.html";
      })
      .catch(err => {
        status.style.color = "red";
        status.textContent = err.message;
      });
  };
</script>

</body>
</html>
