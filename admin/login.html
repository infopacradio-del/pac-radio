<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PAC Radio – Host Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family:Arial,sans-serif;padding:30px;">

<h1>Host Login</h1>
<p>For PAC Radio hosts & moderators only.</p>

<input id="email" type="email" placeholder="Email"
       style="display:block;margin-bottom:10px;width:320px;">
<input id="password" type="password" placeholder="Password"
       style="display:block;margin-bottom:10px;width:320px;">
<button id="loginBtn">Login</button>

<p id="status"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    setPersistence,
    browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDkOfitOyXzftyriVlWIplzrMH4FPyCYw0",
    authDomain: "pac-radio-d838c.firebaseapp.com"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // IMPORTANT: persist auth
  await setPersistence(auth, browserLocalPersistence);

  document.getElementById("loginBtn").onclick = () => {
    signInWithEmailAndPassword(auth, email.value, password.value)
      .then(() => {
        // ✅ FORCE SAME-TAB REDIRECT
        window.location.href =
          "/pac-radio/shows/your-rights.html";
      })
      .catch(err => {
        status.style.color = "red";
        status.textContent = err.message;
      });
  };
</script>

</body>
</html>
``
