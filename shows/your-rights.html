<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Rights | PAC Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body data-show="your-rights">

<header>
  <a href="../index.html">← Back to Home</a>
</header>

<h1>Your Rights</h1>

<p>
  Legal literacy, civic education, and empowerment.
  Breaking down rights, responsibilities, and policies
  so communities are informed and protected.
</p>

<audio controls style="width:100%">
  <source src="https://a10.asurahosting.com:8530/radio.mp3" type="audio/mpeg">
</audio>

<hr>

<h2>Live Listener Comments</h2>

<form id="comment-form">
  <input id="name" placeholder="Your name" required>
  <textarea id="comment" placeholder="Your message" required></textarea>
  <button type="submit">Send</button>
</form>

<div id="comment-list"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDkOfitOyXzftyriVlWIplzrMH4FPyCYw0",
    authDomain: "pac-radio-d838c.firebaseapp.com",
    databaseURL: "https://pac-radio-d838c-default-rtdb.firebaseio.com",
    projectId: "pac-radio-d838c",
    messagingSenderId: "199462097770",
    appId: "1:199462097770:web:5281db835205b64d518b13"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const showKey = document.body.dataset.show;
  const commentsRef = ref(db, `comments/${showKey}`);

  const form = document.getElementById("comment-form");
  const list = document.getElementById("comment-list");

  form.addEventListener("submit", e => {
    e.preventDefault();
    push(commentsRef, {
      name: name.value,
      text: comment.value,
      time: Date.now()
    });
    comment.value = "";
  });

  onChildAdded(commentsRef, snap => {
    const c = snap.val();
    const div = document.createElement("div");
    div.innerHTML = `<strong>${c.name}</strong>: ${c.text}`;
    list.prepend(div);
  });
</script>

</body>
</html>
