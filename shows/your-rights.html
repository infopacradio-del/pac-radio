<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Rights | PAC Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    h1, h2 {
      text-align: center;
    }

    a { text-decoration: none; color: #1C1F2A; }

    .intro {
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    #upload-section {
      display: none;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,.15);
      margin: 30px auto;
      max-width: 800px;
    }

    .episode {
      background: white;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<a href="../index.html">← Back to Home</a>

<h1>Your Rights</h1>

<div class="intro">
  <p>
    Legal literacy, civic education, and empowerment.
    Breaking down rights, laws, and responsibilities in clear language.
  </p>

  <audio controls style="width:100%; margin-top:15px;">
    <source src="https://a10.asurahosting.com:8530/radio.mp3" type="audio/mpeg">
  </audio>

  <p>
    <a target="_blank"
       href="https://wa.me/?text=Listen%20to%20Your%20Rights%20on%20PAC%20Radio:%20https://infopacradio-del.github.io/pac-radio/shows/your-rights.html">
      📲 Share this show on WhatsApp
    </a>
  </p>
</div>

<!-- 🔐 HOST UPLOAD FORM -->
<div id="upload-section">
  <h2>Upload New Episode</h2>

  <input id="ep-title" placeholder="Episode title">
  <textarea id="ep-desc" placeholder="Episode description"></textarea>
  <input id="ep-audio" placeholder="Audio URL (MP3)">
  <button id="upload-btn">Upload Episode</button>
</div>

<h2>Episodes</h2>
<div id="episodes"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import {
    getDatabase,
    ref,
    onChildAdded,
    push,
    remove
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import {
    getAuth,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDkOfitOyXzftyriVlWIplzrMH4FPyCYw0",
    authDomain: "pac-radio-d838c.firebaseapp.com",
    databaseURL: "https://pac-radio-d838c-default-rtdb.firebaseio.com",
    projectId: "pac-radio-d838c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  const episodesRef = ref(db, "episodes/your-rights");
  const episodesDiv = document.getElementById("episodes");
  const uploadSection = document.getElementById("upload-section");
  const uploadBtn = document.getElementById("upload-btn");
  
function revealUploadIfLoggedIn() {
  if (auth.currentUser) {
    uploadSection.style.display = "block";
  }
}

// Check immediately
revealUploadIfLoggedIn();

// Check again after Firebase finishes restoring auth
setTimeout(revealUploadIfLoggedIn, 1000);

  // ✅ UPLOAD EPISODE
  uploadBtn.onclick = () => {
    const title = ep-title.value.trim();
    const desc = ep-desc.value.trim();
    const audio = ep-audio.value.trim();

    if (!title || !audio) {
      alert("Title and audio URL required");
      return;
    }

    push(episodesRef, {
      title,
      description: desc,
      audio,
      createdAt: Date.now()
    });

    ep-title.value = "";
    ep-desc.value = "";
    ep-audio.value = "";
  };

  // ✅ LOAD EPISODES
  onChildAdded(episodesRef, snap => {
    const ep = snap.val();
    const key = snap.key;

    const div = document.createElement("div");
    div.className = "episode";

    div.innerHTML = `
      <h3>${ep.title}</h3>
      <p>${ep.description || ""}</p>
      <audio controls style="width:100%">
        <source src="${ep.audio}" type    if (user) {
        const del = document.createElement("button");
        del.textContent = "Delete";
        del.className = "delete";
        del.onclick = () =>
          remove(ref(db, "episodes/your-rights/" + key));
        div.appendChild(del);
      }
    });

    episodesDiv.appendChild(div);
  });
</script>

</body>
</html>
``
