<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Rights | PAC Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #222;
    }

    a {
      color: #1C1F2A;
      text-decoration: none;
      font-weight: bold;
    }

    h1, h2 {
      text-align: center;
    }

    .intro {
      max-width: 800px;
      margin: 0 auto 30px;
      text-align: center;
    }

    .episode {
      background: white;
      padding: 16px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    .share {
      font-size: 14px;
      margin-top: 10px;
    }

    .delete {
      background: #c62828;
      color: white;
      border: none;
      padding: 6px 10px;
      margin-top: 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    #upload-section {
      display: none;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <a href="../index.html">← Back to Home</a>

  <h1>Your Rights</h1>

  <div class="intro">
    <p>
      Legal literacy, civic education, and empowerment.
      Breaking down rights, laws, and responsibilities in clear language.
    </p>

    <!-- Live Stream -->
    <audio controls style="width:100%; margin-top:15px;">
      <source src="https://a10.asurahosting.com:8530/radio.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>

    <!-- Share show -->
    <p class="share">
      <a target="_blank"
        href="https://wa.me/?text=Listen%20to%20Your%20Rights%20on%20PAC%20Radio:%20https://infopacradio-del.github.io/pac-radio/shows/your-rights.html">
        📲 Share this show on WhatsApp
      </a>
    </p>
  </div>

  <hr>

  <!-- 🔐 HOST ONLY UPLOAD FORM -->
  <div id="upload-section">
    <h2>Upload New Episode</h2>

    <input id="ep-title" type="text" placeholder="Episode title">
    <textarea id="ep-desc" placeholder="Episode description"></textarea>
    <input id="ep-audio" type="text" placeholder="Audio URL (MP3 link)">
    <button id="upload-btn">Upload Episode</button>
  </div>

  <h2>Episodes</h2>
  <div id="episodes"></div>

<!-- ================= SCRIPT ================= -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import {
    getDatabase,
    ref,
    onChildAdded,
    push,
    remove
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import {
    getAuth,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  /* Firebase config */
  const firebaseConfig = {
    apiKey: "AIzaSyDkOfitOyXzftyriVlWIplzrMH4FPyCYw0",
    authDomain: "pac-radio-d838c.firebaseapp.com",
    databaseURL: "https://pac-radio-d838c-default-rtdb.firebaseio.com",
    projectId: "pac-radio-d838c"
  };

  /* Init */
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  /* DOM refs */
  const episodesContainer = document.getElementById("episodes");
  const uploadSection = document.getElementById("upload-section");
  const uploadBtn = document.getElementById("upload-btn");

  /* Firebase ref */
  const episodesRef = ref(db, "episodes/your-rights");

  /* Show upload form ONLY for logged-in hosts */
  onAuthStateChanged(auth, user => {
    if (user) {
      uploadSection.style.display = "block";
    }
  });

  /* Upload episode */
  uploadBtn.addEventListener("click", () => {
    const title = document.getElementById("ep-title").value.trim();
    const description = document.getElementById("ep-desc").value.trim();
    const audio = document.getElementById("ep-audio").value.trim();

    if (!title || !audio) {
      alert("Title and audio URL are required.");
      return;
    }

    push(episodesRef, {
      title,
      description,
      audio,
      createdAt: Date.now()
    });

    document.getElementById("ep-title").value = "";
    document.getElementById("ep-desc").value = "";
    document.getElementById("ep-audio").value = "";
  });

  /* Load episodes */
  onChildAdded(episodesRef, snap => {
    const ep = snap.val();
    const key = snap.key;

    const div = document.createElement("div");
    div.className = "episode";

    div.innerHTML = `
      <h3>${ep.title}</h3>
      <p>${ep.description || ""}</p>
      <audio controls style="width:100%">
        <source src="${ep.audio}" type="audio/mncodeURIComponent(
             ep.title + " – Listen on PAC Radio: " + location.href
           )on (host only) */
    onAuthStateChanged(auth, user => {
      if (user) {
        const del = document.createElement("button");
        del.className = "delete";
        del.textContent = "Delete Episode";
        del.onclick = () =>
          remove(ref(db, "episodes/your-rights/" + key));
        div.appendChild(del);
      }
    });

    episodesContainer.appendChild(div);
  });
</script>

</body>
</html>
