<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Turners | PAC Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body data-show="page-turners">

<a href="../index.html">← Back to Home</a>

<h1>Page Turners</h1>
<p>
Books, authors, African literature and ideas.
Where storytelling, reading and culture meet.
</p>

<audio controls style="width:100%">
  <source src="https://a10.asurahosting.com:8530/radio.mp3" type="audio/mpeg">
</audio>

<h2>Live Listener Comments</h2>

<form id="comment-form">
  <input id="name" placeholder="Your name" required>
  <textarea id="comment" placeholder="Your message" required></textarea>
  <button type="submit">Send</button>
</form>

<div id="comment-list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDkOfitOyXzftyriVlWIplzrMH4FPyCYw0",
  authDomain: "pac-radio-d838c.firebaseapp.com",
  databaseURL: "https://pac-radio-d838c-default-rtdb.firebaseio.com",
  projectId: "pac-radio-d838c",
  messagingSenderId: "199462097770",
  appId: "1:199462097770:web:5281db835205b64d518b13"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const commentsRef = ref(db, "comments/page-turners");

const form = document.getElementById("comment-form");
const list = document.getElementById("comment-list");

form.addEventListener("submit", e => {
  e.preventDefault();
  push(commentsRef, { name: name.value, text: comment.value, time: Date.now() });
  comment.value = "";
});

onChildAdded(commentsRef, s => {
  const d = s.val();
  const div = document.createElement("div");
  div.innerHTML = `<strong>${d.name}</strong>: ${d.text}`;
  list.prepend(div);
});
</script>

</body>
</html>
``
