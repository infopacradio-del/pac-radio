<script type="module">
  const SHOW_ID = "page-turners";

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDkOfitOyXzftyriVlWIplzrMH4FPyCYw0",
    authDomain: "pac-radio-d838c.firebaseapp.com",
    databaseURL: "https://pac-radio-d838c-default-rtdb.firebaseio.com",
    projectId: "pac-radio-d838c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const episodesRef = ref(db, `episodes/${SHOW_ID}`);
  const container = document.getElementById("episodes");

  onValue(episodesRef, snap => {
    container.innerHTML = "";

    if (!snap.exists()) {
      container.innerHTML =
        "<p style='text-align:center;'>No episodes available yet.</p>";
      return;
    }

    const episodesObj = snap.val();

    const episodeList = Object.values(episodesObj)
      .sort((a, b) => b.createdAt - a.createdAt);

    episodeList.forEach((ep, index) => {
      const cleanAudioUrl = ep.audio.replace(/&amp;/g, "&");

      const card = document.createElement("div");
      card.className = "episode";

      const title = document.createElement("h3");
      title.textContent = `Episode ${episodeList.length - index}: ${ep.title}`;

      const date = document.createElement("small");
      date.textContent = new Date(ep.createdAt).toLocaleDateString();

      const description = document.createElement("p");
      description.textContent = ep.description || "";

      const audio = document.createElement("audio");
      audio.controls = true;
      audio.preload = "metadata";
      audio.src = cleanAudioUrl;

      card.appendChild(title);
      card.appendChild(date);
      card.appendChild(description);
      card.appendChild(audio);

      container.appendChild(card);
    });
  });
</script>
