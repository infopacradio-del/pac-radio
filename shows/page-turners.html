<script type="module">
  /* ===========================
     Imports (must be top-level)
     =========================== */
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import {
    getDatabase,
    ref,
    onValue
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  /* ===========================
     Show configuration
     =========================== */
  const SHOW_ID = "your-rights"; // change for other shows

  /* ===========================
     Firebase config
     =========================== */
  const firebaseConfig = {
    apiKey: "AIzaSyDkOfitOyXzftyriVlWIplzrMH4FPyCYw0",
    authDomain: "pac-radio-d838c.firebaseapp.com",
    databaseURL: "https://pac-radio-d838c-default-rtdb.firebaseio.com",
    projectId: "pac-radio-d838c"
  };

  /* ===========================
     Init Firebase (runs immediately)
     =========================== */
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  /* ===========================
     Wait for DOM before touching it
     =========================== */
  document.addEventListener("DOMContentLoaded", () => {
    const container = document.getElementById("episodes");

    if (!container) {
      console.error("Episodes container not found");
      return;
    }

    const episodesRef = ref(db, `episodes/${SHOW_ID}`);

    onValue(episodesRef, snapshot => {
      container.innerHTML = "";

      if (!snapshot.exists()) {
        container.innerHTML =
          "<p style='text-align:center;'>No episodes available yet.</p>";
        return;
      }

      const episodesObj = snapshot.val();

      // Convert object → array and sort newest first
      const episodeList = Object.values(episodesObj)
        .sort((a, b) => b.createdAt - a.createdAt);

      episodeList.forEach((ep, index) => {
        // ✅ Correct URL decoding
        const cleanAudioUrl = ep.audio.replace(/&amp;/g, "&");

        const card = document.createElement("div");
        card.className = "episode";

        const title = document.createElement("h3");
        title.textContent =
          `Episode ${episodeList.length - index}: ${ep.title}`;

        const date = document.createElement("small");
        date.textContent =
          new Date(ep.createdAt).toLocaleDateString();

        const description = document.createElement("p");
        description.textContent = ep.description || "";

        const audio = document.createElement("audio");
        audio.controls = true;
        audio.preload = "metadata";
        audio.src = cleanAudioUrl;

        card.appendChild(title);
        card.appendChild(date);
        card.appendChild(description);
        card.appendChild(audio);

        container.appendChild(card);
      });
    });
  });
</script>
